<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
    }

    .usersDiv {
        margin: 5px;
        padding: 20px;
        background-color: beige;
        width: 300px;
    }
</style>

<body>
    <h1>Welcome to Fetch API</h1>
    <button id="btn">Click to fetch</button>
    <!-- <button id="add">Add data to localstorage</button>
    <button id="read">Read</button> -->

    <h1>Users Data</h1>
    <div id="maindiv" style=" padding: 20px; background-color: lightblue;display: flex; flex-wrap: wrap;">

    </div>
    <script>
        // document.querySelector("#add").addEventListener("click", () => {

        // })

        // document.querySelector("#read").addEventListener("click", () => {
        //     let name = localStorage.getItem("name")
        //     console.log(name);
        // })

        display()
        function display() {
            const userData = JSON.parse(localStorage.getItem("users"))
            // const parsed = JSON.parse(userData)
            const maindiv = document.querySelector("#maindiv")


            userData.forEach(user => {
                console.log(user);

                maindiv.innerHTML += `
                        
                        <div class="usersDiv">
                            <h1> ${user.name} </h1>
                            <p> ${user.email} </p>
                        </div>
                    
                        `
            });
        }
        // localStorage = [

        // "users" = '[{}{}{}]'
        // "token" = "dskndsk"
        // ]



        document.querySelector("#btn").addEventListener("click", () => {
            console.log("Event started...");

            fetch("https://jsonplaceholder.typicode.com/users")
                .then(res => {
                    return res.json()
                })
                .then((data) => {

                    // data.foreach = user[0]
                    // const div = document.createElement("div")
                    // nameP
                    // ageP
                    // addressP

                    // const maindiv = document.querySelector("#maindiv")
                    console.log(data);

                    localStorage.setItem("users", JSON.stringify(data))


                    display()

                    // data.forEach(user => {
                    //     console.log(user);

                    //     maindiv.innerHTML += `

                    //     <div class="usersDiv">
                    //         <h1> ${user.name} </h1>
                    //         <p> ${user.email} </p>
                    //     </div>

                    //     `
                    // });


                    // div  === userdata

                    // maindiv - append child div

                })
                .catch((err) => {
                    // alert("Failed to fetch data, try again later..")
                    console.log("Something wrong:", err)
                })
                .finally(() => {
                    console.log("Operation completed..");
                })

            console.log("End..");
        })
    </script>
</body>

</html>
